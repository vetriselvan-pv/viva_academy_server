server:
  port: 8000

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: students-service
          uri: lb://STUDENTS
          predicates:
            - Path=/api/v1/students/**
        - id: admin-service
          uri: lb://ADMIN
          predicates:
            - Path=/api/v1/admin/**
        - id: auth-service
          uri: lb://AUTH
          predicates:
            - Path=/api/v1/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
